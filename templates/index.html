<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>
<title>MeuDrive</title>
<style>
:root{
    --bg:#121212;
    --card:#1E1E1E;
    --text:#FFFFFF;
    --text-secondary:#9A9A9A;
    --primary:#4CAF50;
    --primary-hover:#45A049;
    --border:#303030;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}
.card{
    width:min(100%, 480px);
    display:flex;
    flex-direction:column;
    gap:20px;
    background:var(--card);
    border-radius:20px;
    padding:32px 24px;
}
.header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}
.header h1{
    font-size:28px;
    font-weight:600;
}
.header p{
    color:var(--text-secondary);
    text-align:center;
    line-height:1.5;
}
.success{
    display:none;
    padding:14px;
    border-radius:12px;
    background:rgba(76,175,80,.15);
    color:#7BE080;
    text-align:center;
}
.upload-form{
    display:flex;
    flex-direction:column;
    gap:16px;
}
.upload-zone{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:8px;
    min-height:160px;
    border:2px dashed var(--border);
    border-radius:16px;
    cursor:pointer;
    transition:.2s;
}

.upload-zone:hover{
    border-color:var(--primary);
}

.upload-icon{
    font-size:36px;
}

.upload-title{
    font-size:16px;
    font-weight:600;
}

.upload-subtitle{
    color:var(--text-secondary);
    font-size:13px;
}

input[type=file]{
    display:none;
}

.file-name{
    text-align:center;
    color:var(--text-secondary);
    word-break:break-word;
    min-height:20px;
}

button{
    height:50px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:var(--primary-hover);
}

</style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>MeuDrive</h1>
        <p>
            Envie arquivos para este computador
        </p>
    </div>
    <div
        id="success"
        class="success"
    >
        Arquivo enviado com sucesso.
    </div>
    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
        class="upload-form"
    >
        <label
            for="arquivo"
            class="upload-zone"
        >
            <div class="upload-icon">
                📁
            </div>
            <div class="upload-title">
                Selecionar arquivo
            </div>
            <div class="upload-subtitle">
                Fotos, vídeos, PDFs, ZIPs e mais
            </div>
        </label>
        <input
            id="arquivo"
            type="file"
            name="arquivo"
            required
        >
        <div
            id="fileName"
            class="file-name"
        >
            Nenhum arquivo selecionado
        </div>

        <button type="submit">
            Enviar arquivo
        </button>
    </form>
</div>
<script>
const arquivo =
document.getElementById(
    "arquivo"
);
const fileName =
document.getElementById(
    "fileName"
);
arquivo.addEventListener(
    "change",
    () => {
        if(arquivo.files.length)
        {
            fileName.textContent =
                arquivo.files[0].name;
        }
        else
        {
            fileName.textContent =
                "Nenhum arquivo selecionado";
        }

    }
);
const params =
new URLSearchParams(
    window.location.search
);
if(params.get("sucesso"))
{
    document
        .getElementById("success")
        .style.display = "block";
}
</script>
</body>
</html>
